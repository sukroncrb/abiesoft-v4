    <style>
        /* Custom Animations */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
        .animate-toast-in { animation: toastIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-toast-out { animation: toastOut 0.3s ease-in forwards; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.98); } 
            to { opacity: 1; transform: scale(1); } 
        }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(20px); } 
            to { opacity: 1; transform: translateX(0); } 
        }
        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes toastOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Hide specific elements during printing */
        @media print {
            body { background-color: white !important; }
            .print-hidden { display: none !important; }
            .print-exact { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>

                btn.innerHTML = '<i data-lucide="eye-off" class="w-5 h-5 text-blue-600"></i>';

        // --- APP STATE & LOGIC ---

            // --- TOAST LOGIC ---
            showToast(message, type = 'success') {
                const id = Date.now();
                this.state.toasts.push({ id, message, type });
                this.renderToasts();

                setTimeout(() => {
                    this.removeToast(id);
                }, 3000);
            },

            removeToast(id) {
                const toastEl = document.getElementById(`toast-${id}`);
                if (toastEl) {
                    toastEl.classList.remove('animate-toast-in');
                    toastEl.classList.add('animate-toast-out');
                    setTimeout(() => {
                        this.state.toasts = this.state.toasts.filter(t => t.id !== id);
                        this.renderToasts();
                    }, 300);
                } else {
                    this.state.toasts = this.state.toasts.filter(t => t.id !== id);
                    this.renderToasts();
                }
            },

            // --- HELPERS ---
            formatRupiah(number) {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
            },

            generateOrderId() {
                return 'TKT-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            },

            // --- SEARCH & LOAD MORE ACTIONS ---
            updateSearchHome(val) {
                this.state.searchHome = val.toLowerCase();
                this.state.limitHome = 3; 
                this.renderHomeList();
            },
            
            loadMoreHome() {
                this.state.limitHome += 3;
                this.renderHomeList();
            },

            updateSearchAdmin(val) {
                this.state.searchAdmin = val.toLowerCase();
                this.state.limitAdmin = 3; 
                this.renderAdminList();
            },

            loadMoreAdmin() {
                this.state.limitAdmin += 3;
                this.renderAdminList();
            },

            updateSearchOrder(val) {
                this.state.searchOrder = val.toLowerCase();
                this.state.limitOrder = 3; 
                this.renderAdminOrders();
            },

            loadMoreOrders() {
                this.state.limitOrder += 3;
                this.renderAdminOrders();
            },

            switchAdminTab(tabName) {
                this.state.adminActiveTab = tabName;
                this.render();
            },

            // --- NAVIGATION ---
            goHome() {
                if (this.state.step === 'receipt') return;
                this.state.step = 'home';
                this.render();
            },

            goBack() {
                if (this.state.step === 'details') this.state.step = 'home';
                else if (this.state.step === 'checkout') this.state.step = 'details';
                else if (this.state.step === 'payment') this.state.step = 'checkout';
                else if (this.state.step === 'waiting_payment') this.state.step = 'payment';
                else if (this.state.step === 'adminAddEvent') this.state.step = 'admin';
                else if (this.state.step === 'profile') this.state.step = 'admin';
                else if (this.state.step === 'login' || this.state.step === 'register') this.state.step = 'home';
                else if (this.state.step === 'customer_dashboard') this.state.step = 'home';
                this.render();
            },

            // --- AUTHENTICATION (LOGIN & REGISTER) ---
            generateCaptcha() {
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
                let captcha = '';
                for (let i = 0; i < 6; i++) {
                    captcha += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                this.state.captchaText = captcha;
            },

            refreshCaptcha() {
                this.generateCaptcha();
                this.render();
            },

            goLogin() {
                this.generateCaptcha();
                this.state.step = 'login';
                this.render();
            },

            goRegister() {
                this.state.step = 'register';
                this.render();
            },

            async handleRegister(e) {
                e.preventDefault();
                const form = e.target;
                const name = form.name.value;
                const email = form.email.value;
                const phone = form.phone.value;
                const password = form.password.value;
                const confirmPassword = form.confirm_password.value;

                if (password !== confirmPassword) {
                    this.showToast('Password dan Konfirmasi Password tidak cocok!', 'error');
                    return;
                }

                this.state.isLoggingIn = true;
                this.render();

                await new Promise(r => setTimeout(r, 1000));

                this.state.customerProfile = { name, email, phone, password };
                this.state.isCustomer = true;
                this.state.isAdmin = false; 
                this.state.isLoggingIn = false;

                this.showToast(`Pendaftaran berhasil! Selamat datang ${name}.`, 'success');
                this.state.step = 'home';
                this.render();
            },

            async handleLogin(e) {
                e.preventDefault();
                const u = e.target.username.value;
                const p = e.target.password.value;
                const c = e.target.captcha.value;
                
                if (c.toLowerCase() !== this.state.captchaText.toLowerCase()) {
                    this.showToast('Kode verifikasi CAPTCHA salah! Silakan coba lagi.', 'error');
                    this.refreshCaptcha();
                    return;
                }

                this.state.isLoggingIn = true;
                this.render(); 

                await new Promise(r => setTimeout(r, 1000));

                this.state.isLoggingIn = false;

                if (u === 'admin' && p === this.state.userProfile.password) {
                    this.showToast('Login Admin Berhasil!', 'success');
                    this.state.isAdmin = true;
                    this.state.isCustomer = false;
                    this.state.step = 'admin';
                    this.render();
                } 
                else if (this.state.customerProfile && u === this.state.customerProfile.email && p === this.state.customerProfile.password) {
                    this.showToast(`Login Berhasil! Selamat datang ${this.state.customerProfile.name}.`, 'success');
                    this.state.isCustomer = true;
                    this.state.isAdmin = false;
                    this.state.step = 'home';
                    this.render();
                } 
                else {
                    this.showToast('Email/Username atau password salah!', 'error');
                    this.refreshCaptcha(); 
                    this.render();
                }
            },

            showLogoutModal() {
                this.state.activeModal = 'logout';
                this.renderModal();
            },

            confirmLogout() {
                this.state.isAdmin = false;
                this.state.isCustomer = false;
                this.state.step = 'home';
                this.closeModal();
                this.showToast('Anda telah berhasil keluar.', 'success');
                this.render();
            },

            goCustomerDashboard() {
                this.state.step = 'customer_dashboard';
                this.render();
            },

            // --- ADMIN EVENT ACTIONS ---
            showDeleteModal(eventId) {
                this.state.itemToDelete = eventId;
                this.state.activeModal = 'delete';
                this.renderModal();
            },

            confirmDelete() {
                const eventId = this.state.itemToDelete;
                this.state.events = this.state.events.filter(e => e.id !== eventId);
                this.closeModal();
                this.showToast('Event berhasil dihapus.', 'success');
                
                if (this.state.step === 'admin') {
                    this.renderAdminList();
                } else {
                    this.render();
                }
            },

            closeModal() {
                this.state.activeModal = null;
                this.state.itemToDelete = null;
                this.renderModal();
            },

            goProfile() {
                this.state.step = 'profile';
                this.render();
            },

            async saveProfile(e) {
                e.preventDefault();
                
                const form = e.target;
                const newName = form.name.value;
                const newPassword = form.password.value;
                const fileInput = form.photo;
                const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;

                this.state.isSavingProfile = true;
                this.render();

                await new Promise(r => setTimeout(r, 1000));

                let newPhoto = this.state.userProfile.photo;

                if (file) {
                    newPhoto = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                }

                this.state.userProfile.name = newName;
                this.state.userProfile.photo = newPhoto;
                
                if (newPassword.trim() !== '') {
                    this.state.userProfile.password = newPassword;
                    this.showToast('Profil dan Password berhasil diperbarui!', 'success');
                } else {
                    this.showToast('Profil berhasil diperbarui!', 'success');
                }
                
                this.state.isSavingProfile = false;
                this.render(); 
            },

            goAdminDashboard() {
                this.state.step = 'admin';
                this.render();
            },

            goAddEvent() {
                this.state.editingEventId = null;
                this.state.step = 'adminAddEvent';
                this.render();
            },

            goEditEvent(eventId) {
                this.state.editingEventId = eventId;
                this.state.step = 'adminAddEvent';
                this.render();
            },

            async submitNewEvent(e) {
                e.preventDefault();
                
                const form = e.target;
                const title = form.title.value;
                const date = form.date.value;
                const time = form.time.value;
                const location = form.location.value;
                const fileInput = form.image;
                const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;

                const rows = document.querySelectorAll('.category-row');
                if (rows.length === 0) {
                    this.showToast('Harap tambahkan minimal 1 kategori tiket!', 'error');
                    return;
                }

                const categories = Array.from(rows).map((row, index) => {
                    return {
                        id: 'c_new_' + Date.now() + '_' + index,
                        name: row.querySelector('.cat-name').value,
                        price: parseInt(row.querySelector('.cat-price').value),
                        available: parseInt(row.querySelector('.cat-quota').value)
                    };
                });

                this.state.isSavingEvent = true;
                this.render();

                await new Promise(r => setTimeout(r, 1500));

                let imgUrl = 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80';
                
                if (this.state.editingEventId) {
                    const existingEvent = this.state.events.find(ev => ev.id === this.state.editingEventId);
                    if (existingEvent) imgUrl = existingEvent.image;
                }

                if (file) {
                    imgUrl = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                }

                const newEventData = {
                    id: this.state.editingEventId ? this.state.editingEventId : 'e_' + Date.now(),
                    title: title,
                    date: date,
                    time: time,
                    location: location,
                    image: imgUrl,
                    categories: categories
                };

                this.state.isSavingEvent = false;

                if (this.state.editingEventId) {
                    const index = this.state.events.findIndex(e => e.id === this.state.editingEventId);
                    if (index !== -1) {
                        this.state.events[index] = newEventData;
                    }
                    this.showToast('Event berhasil diperbarui!', 'success');
                } else {
                    this.state.events.unshift(newEventData);
                    this.showToast('Event berhasil ditambahkan!', 'success');
                }
                
                this.state.step = 'admin';
                this.render();
            },

            // --- BUYING TICKETS ---
            selectEvent(eventId) {
                const event = this.state.events.find(e => e.id === eventId);
                this.state.selectedEvent = event;
                this.state.selectedCategory = event.categories[0];
                this.state.quantity = 1;
                this.state.step = 'details';
                this.render();
            },

            selectCategory(categoryId) {
                const category = this.state.selectedEvent.categories.find(c => c.id === categoryId);
                this.state.selectedCategory = category;
                this.render();
            },

            changeQuantity(delta) {
                let newQ = this.state.quantity + delta;
                if (newQ >= 1 && newQ <= 5) {
                    this.state.quantity = newQ;
                    this.render();
                } else if (newQ > 5) {
                    this.showToast('Maksimal pembelian adalah 5 tiket per pesanan.', 'error');
                }
            },

            proceedToCheckout() {
                if (!this.state.selectedCategory) {
                    this.showToast('Silakan pilih kategori tiket terlebih dahulu.', 'error');
                    return;
                }
                
                if (this.state.isCustomer && this.state.customerProfile) {
                    this.state.buyerInfo = {
                        name: this.state.customerProfile.name,
                        email: this.state.customerProfile.email,
                        phone: this.state.customerProfile.phone
                    };
                } else {
                    this.state.buyerInfo = { name: '', email: '', phone: '' };
                }
                
                this.state.step = 'checkout';
                this.render();
            },

            updateBuyerInfo(field, value) {
                this.state.buyerInfo[field] = value;
            },

            updateVerificationMethod(val) {
                this.state.verificationMethod = val;
                const lblEmail = document.getElementById('label-verify-email');
                const lblWa = document.getElementById('label-verify-wa');
                
                if (val === 'email') {
                    lblEmail.classList.add('border-blue-500', 'bg-blue-50');
                    lblEmail.classList.remove('border-gray-200');
                    lblWa.classList.remove('border-blue-500', 'bg-blue-50');
                    lblWa.classList.add('border-gray-200');
                } else {
                    lblWa.classList.add('border-blue-500', 'bg-blue-50');
                    lblWa.classList.remove('border-gray-200');
                    lblEmail.classList.remove('border-blue-500', 'bg-blue-50');
                    lblEmail.classList.add('border-gray-200');
                }
            },

            proceedToPayment(event) {
                event.preventDefault();
                if (!this.state.buyerInfo.name || !this.state.buyerInfo.email || !this.state.buyerInfo.phone) {
                    this.showToast('Mohon lengkapi semua data diri pemesan.', 'error');
                    return;
                }
                
                this.state.otpCode = Math.floor(1000 + Math.random() * 9000).toString();
                const target = this.state.verificationMethod === 'email' ? this.state.buyerInfo.email : this.state.buyerInfo.phone;
                const viaText = this.state.verificationMethod === 'email' ? 'Email' : 'WhatsApp';
                
                this.showToast(`Simulasi OTP: ${this.state.otpCode} (Dikirim via ${viaText} ke ${target})`, 'success');
                
                this.state.activeModal = 'otp';
                this.renderModal();
            },

            verifyOtp(event) {
                event.preventDefault();
                const inputCode = event.target.otp.value;
                
                if (inputCode === this.state.otpCode) {
                    this.closeModal(); 
                    this.state.otpCode = null;
                    this.state.step = 'payment';
                    this.showToast('Verifikasi sukses!', 'success');
                    this.render();
                } else {
                    this.showToast('Kode verifikasi tidak valid. Silakan periksa kembali.', 'error');
                }
            },

            selectPaymentMethod(methodId) {
                this.state.paymentMethod = methodId;
                this.render();
            },

            processPayment() {
                if (!this.state.paymentMethod) {
                    this.showToast('Pilih metode pembayaran terlebih dahulu.', 'error');
                    return;
                }
                if (this.state.isProcessing) return;
                
                this.state.isProcessing = true;
                this.render(); 

                setTimeout(() => {
                    this.state.isProcessing = false;
                    this.state.step = 'waiting_payment';
                    this.render();

                    setTimeout(() => {
                        if (this.state.step === 'waiting_payment') {
                            const newOrder = {
                                orderId: this.generateOrderId(),
                                event: this.state.selectedEvent,
                                category: this.state.selectedCategory,
                                quantity: this.state.quantity,
                                buyer: this.state.buyerInfo,
                                paymentMethod: PAYMENT_METHODS.find(m => m.id === this.state.paymentMethod).name,
                                purchaseDate: new Date().toLocaleString('id-ID'),
                                total: this.state.selectedCategory.price * this.state.quantity,
                                adminFee: 5000
                            };
                            
                            this.state.orderData = newOrder;
                            this.state.orders.unshift(newOrder); 
                            
                            this.showToast('Pembayaran berhasil terdeteksi!', 'success');
                            this.state.step = 'receipt';
                            this.render();
                        }
                    }, 5000); 
                }, 1000); 
            },

            resetApp() {
                this.state.step = 'home';
                this.state.selectedEvent = null;
                this.state.selectedCategory = null;
                this.state.quantity = 1;
                this.state.buyerInfo = { name: '', email: '', phone: '' };
                this.state.verificationMethod = 'email'; 
                this.state.otpCode = null;
                this.state.paymentMethod = '';
                this.state.isProcessing = false;
                this.state.orderData = null;
                this.state.limitHome = 3; 
                this.state.searchHome = '';
                
                this.render();
            },

                window.print();
            },

                            <p class="text-blue-600 font-semibold animate-pulse">Sistem sedang mendeteksi pembayaran otomatis...</p>
                        </div>
                    </div>
                `;
            },

            getViewReceipt() {
                const order = this.state.orderData;
                if (!order) return '';

                return `
                    <div class="max-w-2xl mx-auto px-4 py-8">
                        
                        <!-- Success Alert -->
                        <div class="text-center mb-8 print-hidden">
                            <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                                <i data-lucide="check-circle" class="w-8 h-8 text-green-500"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-gray-800">Pembayaran Berhasil!</h2>
                            <p class="text-gray-600 mt-2">Terima kasih, e-tiket Anda telah diterbitkan.</p>
                        </div>

                        <!-- Ticket -->
                        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200 relative print-exact print:shadow-none print:border-2 print:border-black print:rounded-none">
                            
                            <!-- Cutouts -->
                            <div class="absolute top-1/2 -left-4 w-8 h-8 bg-gray-50 rounded-full border-r border-gray-200 print-hidden"></div>
                            <div class="absolute top-1/2 -right-4 w-8 h-8 bg-gray-50 rounded-full border-l border-gray-200 print-hidden"></div>

                            <div class="bg-blue-600 text-white p-6 md:p-8 text-center print-exact print:bg-gray-800 print:text-black print:border-b-2 print:border-black">
                                <h1 class="text-3xl font-black uppercase tracking-wider mb-2 print-exact">${order.event.title}</h1>
                                <p class="opacity-90 font-medium">E-TIKET RESMI</p>
                            </div>

                            <div class="p-6 md:p-8 grid grid-cols-1 sm:grid-cols-3 gap-6">
                                <div class="sm:col-span-2 space-y-4">
                                    <div>
                                        <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Nama Pemesan</p>
                                        <p class="font-bold text-gray-800 text-lg">${order.buyer.name}</p>
                                    </div>
                                    
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Tanggal</p>
                                            <p class="font-semibold text-gray-800 flex items-center gap-1">
                                                <i data-lucide="calendar" class="w-4 h-4 text-blue-500 print-hidden"></i> 
                                                ${order.event.date}
                                            </p>
                                        </div>
                                        <div>
                                            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Waktu</p>
                                            <p class="font-semibold text-gray-800 flex items-center gap-1">
                                                <i data-lucide="clock" class="w-4 h-4 text-blue-500 print-hidden"></i> 
                                                ${order.event.time}
                                            </p>
                                        </div>
                                    </div>

                                    <div>
                                        <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Lokasi</p>
                                        <p class="font-semibold text-gray-800 flex items-start gap-1">
                                            <i data-lucide="map-pin" class="w-4 h-4 text-red-500 shrink-0 mt-0.5 print-hidden"></i> 
                                            ${order.event.location}
                                        </p>
                                    </div>

                                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 print-exact print:bg-white print:border-2 print:border-black">
                                        <div class="grid grid-cols-2 gap-2">
                                            <div>
                                                <p class="text-xs text-gray-500">Kategori Tiket</p>
                                                <p class="font-bold text-blue-600 text-lg print-exact print:text-black">${order.category.name}</p>
                                            </div>
                                            <div class="text-right">
                                                <p class="text-xs text-gray-500">Jumlah</p>
                                                <p class="font-bold text-gray-800 text-lg">${order.quantity} Orang</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex flex-col items-center justify-center border-t sm:border-t-0 sm:border-l border-dashed border-gray-300 pt-6 sm:pt-0 sm:pl-6 print:border-black">
                                    <div class="bg-gray-100 p-2 rounded-lg mb-3 print-exact print:bg-white print:border print:border-black print:p-0">
                                        <i data-lucide="qr-code" class="w-24 h-24 text-gray-800" stroke-width="1"></i>
                                    </div>
                                    <p class="text-xs text-gray-500 mb-1">Kode Booking</p>
                                    <p class="font-mono font-bold text-gray-800 text-lg bg-gray-100 px-3 py-1 rounded print-exact print:bg-white print:border print:border-black">${order.orderId}</p>
                                </div>
                            </div>

                            <div class="bg-gray-50 p-6 border-t border-dashed border-gray-300 text-sm print-exact print:bg-white print:border-t-2 print:border-black">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-gray-500">Metode Pembayaran</span>
                                    <span class="font-medium text-gray-800">${order.paymentMethod}</span>
                                </div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-gray-500">Waktu Pembayaran</span>
                                    <span class="font-medium text-gray-800">${order.purchaseDate}</span>
                                </div>
                                <div class="flex justify-between items-center pt-2 border-t border-gray-200 mt-2 print:border-black">
                                    <span class="font-bold text-gray-800">Total Dibayar</span>
                                    <span class="font-bold text-blue-600 text-lg print-exact print:text-black">
                                        ${this.formatRupiah(order.total + order.adminFee)}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="mt-8 flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                            <button type="button" onclick="app.printReceipt()" class="flex items-center justify-center gap-2 bg-gray-800 text-white font-bold py-3 px-6 rounded-xl hover:bg-gray-900 transition">
                                <i data-lucide="printer" class="w-5 h-5"></i> Cetak Tiket
                            </button>
                            <button type="button" onclick="app.resetApp()" class="flex items-center justify-center gap-2 bg-blue-100 text-blue-700 font-bold py-3 px-6 rounded-xl hover:bg-blue-200 transition">
                                Beli Tiket Lainnya
                            </button>
                        </div>
                    </div>
                `;
            }
        };

        // Inisialisasi Aplikasi ketika DOM sudah siap
        document.addEventListener('DOMContentLoaded', () => {
            app.render();
        });
    </script>
</body>
</html>
